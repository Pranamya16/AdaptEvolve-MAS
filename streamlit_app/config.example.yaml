      email: your@email.com
      name: Your Name
      # Generate bcrypt hash: python -c "import bcrypt; print(bcrypt.hashpw(b'yourpassword', bcrypt.gensalt()).decode())"
      password: "$2b$12$REPLACE_WITH_YOUR_BCRYPT_HASH"
    demo_user:
      email: demo@yourdomain.com
      name: Demo User
      password: "$2b$12$REPLACE_WITH_YOUR_BCRYPT_HASH"

